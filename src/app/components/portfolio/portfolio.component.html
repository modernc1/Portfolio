<section id="portfolio" class="portfolio-section">
    <div class="section-container">
        <h2 class="text-gradient">Featured Work</h2>

        <div class="filter-container">
            <button [class.active]="selectedCategory() === 'All'" (click)="setCategory('All')">All Projects</button>
            <button [class.active]="selectedCategory() === 'Web Applications'" (click)="setCategory('Web Applications')">Web Apps</button>
            <button [class.active]="selectedCategory() === 'Mobile Applications'" (click)="setCategory('Mobile Applications')">Mobile Apps</button>
        </div>

        <div class="portfolio-grid">
            <div *ngFor="let project of filteredProjects()" class="portfolio-card">
              <div class="card-image-wrapper">
                  <img [src]="project.imageUrl" [alt]="project.title" class="item-image" loading="lazy">
                  <div class="card-badges" *ngIf="project.technologies">
                      <span *ngFor="let tech of project.technologies.slice(0, 2)" class="tech-tag">{{tech}}</span>
                  </div>
              </div>

              <div class="card-content">
                  <h3>{{project.title}}</h3>
                  <div class="card-footer">
                    <a [routerLink]="'projects/' + project.title.replaceAll(' ', '-')" fragment="Details" class="btn-link">View Details <i class="bi bi-arrow-right"></i></a>
                    <a *ngIf="project.liveUrl" [href]="project.liveUrl" target="_blank" class="btn-icon" title="Live Demo"><i class="bi bi-box-arrow-up-right"></i></a>
                  </div>
              </div>
            </div>
        </div>
    </div>
</section>
